<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>버터떡맵 관리자</title>
    <link href="https://cdn.jsdelivr.net/npm/pretendard@3.3.6/dist/web/static/pretendard.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: #FEFAF6;
            color: #333;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        /* ===== LOGIN SCREEN ===== */
        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #F4845F 0%, #D4A574 100%);
            animation: fadeIn 0.3s ease-in;
        }

        .login-card {
            background: white;
            border-radius: 20px;
            padding: 3rem 2rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 380px;
        }

        .login-title {
            font-size: 1.8rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 0.5rem;
            color: #333;
        }

        .login-subtitle {
            text-align: center;
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #333;
            font-size: 0.95rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 2px solid #E0D4C8;
            border-radius: 10px;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #D4A574;
            box-shadow: 0 0 0 3px rgba(212, 165, 116, 0.1);
        }

        .login-button {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #D4A574, #C69566);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1.5rem;
        }

        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(212, 165, 116, 0.4);
        }

        .login-button:active {
            transform: translateY(0);
        }

        .login-error {
            color: #E74C3C;
            font-size: 0.9rem;
            margin-top: 1rem;
            text-align: center;
            display: none;
        }

        .setup-mode .setup-hint {
            background: #FFF3E0;
            border-left: 4px solid #F4845F;
            padding: 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            color: #5D4037;
            margin-bottom: 1.5rem;
        }

        /* ===== ADMIN DASHBOARD ===== */
        .admin-dashboard {
            display: none;
            flex-direction: column;
            height: 100vh;
        }

        .admin-dashboard.active {
            display: flex;
        }

        /* ===== NAVBAR ===== */
        .navbar {
            background: white;
            border-bottom: 2px solid #E8DED2;
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 2rem;
            height: 70px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .navbar-brand {
            font-size: 1.3rem;
            font-weight: 700;
            color: #D4A574;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .navbar-tabs {
            display: flex;
            gap: 0;
            flex: 1;
        }

        .navbar-tab {
            padding: 0 1.5rem;
            height: 70px;
            display: flex;
            align-items: center;
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            color: #666;
            font-weight: 500;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .navbar-tab:hover {
            color: #D4A574;
            background: #FEFAF6;
        }

        .navbar-tab.active {
            color: #D4A574;
            border-bottom-color: #D4A574;
        }

        .navbar-logout {
            padding: 0.7rem 1.2rem;
            background: #F4845F;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .navbar-logout:hover {
            background: #E86E48;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(244, 132, 95, 0.3);
        }

        /* ===== CONTENT AREA ===== */
        .admin-content {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease-in;
        }

        .tab-content.active {
            display: block;
        }

        /* ===== STORE MANAGEMENT TAB ===== */
        .store-header {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .summary-card {
            background: white;
            padding: 1.5rem;
            border-radius: 15px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            border-left: 4px solid #D4A574;
        }

        .summary-card.custom {
            border-left-color: #F4845F;
        }

        .summary-card.banned {
            border-left-color: #E74C3C;
        }

        .summary-label {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .summary-value {
            font-size: 2rem;
            font-weight: 700;
            color: #D4A574;
        }

        .summary-card.custom .summary-value {
            color: #F4845F;
        }

        .summary-card.banned .summary-value {
            color: #E74C3C;
        }

        .store-controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 0.8rem 1.2rem;
            border: 2px solid #E0D4C8;
            border-radius: 10px;
            font-size: 0.95rem;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            outline: none;
            border-color: #D4A574;
            box-shadow: 0 0 0 3px rgba(212, 165, 116, 0.1);
        }

        .sort-select {
            padding: 0.8rem 1.2rem;
            border: 2px solid #E0D4C8;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .sort-select:focus {
            outline: none;
            border-color: #D4A574;
        }

        .stores-table {
            width: 100%;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            border-collapse: collapse;
        }

        .stores-table thead {
            background: #F5F0EB;
            border-bottom: 2px solid #E0D4C8;
        }

        .stores-table th {
            padding: 1.2rem;
            text-align: left;
            font-weight: 600;
            color: #666;
            font-size: 0.95rem;
        }

        .stores-table tbody tr {
            border-bottom: 1px solid #E8DED2;
            transition: background 0.2s ease;
        }

        .stores-table tbody tr:hover {
            background: #FEFAF6;
        }

        .stores-table td {
            padding: 1.2rem;
            color: #333;
            font-size: 0.95rem;
        }

        .store-name {
            font-weight: 600;
            color: #333;
        }

        .store-type-badge {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .type-default {
            background: #E3F2FD;
            color: #1976D2;
        }

        .type-custom {
            background: #FFF3E0;
            color: #F57C00;
        }

        .store-status {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .status-normal {
            background: #E8F5E9;
            color: #2E7D32;
        }

        .status-banned {
            background: #FFEBEE;
            color: #C62828;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .store-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 0.5rem 0.8rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s ease;
            background: white;
            border: 1px solid #E0D4C8;
            color: #666;
        }

        .action-btn:hover {
            background: #F5F0EB;
            border-color: #D4A574;
        }

        .action-btn.danger {
            color: #E74C3C;
            border-color: #E74C3C;
        }

        .action-btn.danger:hover {
            background: #FFEBEE;
        }

        /* ===== MODALS ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease-in;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 15px;
            padding: 2rem;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #E8DED2;
            padding-bottom: 1rem;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #333;
        }

        .modal-close {
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 1.5rem;
            color: #999;
            transition: color 0.2s ease;
        }

        .modal-close:hover {
            color: #333;
        }

        .modal-footer {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 2px solid #E8DED2;
        }

        .btn {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, #D4A574, #C69566);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(212, 165, 116, 0.4);
        }

        .btn-secondary {
            background: #E8DED2;
            color: #333;
        }

        .btn-secondary:hover {
            background: #D9CCBF;
        }

        .btn-danger {
            background: #E74C3C;
            color: white;
        }

        .btn-danger:hover {
            background: #C0392B;
        }

        /* ===== STATISTICS TAB ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: white;
            padding: 1.5rem;
            border-radius: 15px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        .stat-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .stat-label {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #D4A574;
        }

        .chart-container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            margin-bottom: 2rem;
        }

        .chart-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: #333;
        }

        .bar-chart {
            display: flex;
            align-items: flex-end;
            gap: 1.5rem;
            height: 300px;
            justify-content: center;
        }

        .bar-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            flex: 1;
            max-width: 100px;
        }

        .bar {
            width: 100%;
            background: linear-gradient(180deg, #F4845F, #D4A574);
            border-radius: 8px 8px 0 0;
            transition: all 0.3s ease;
            min-height: 20px;
        }

        .bar-item:hover .bar {
            filter: brightness(1.1);
        }

        .bar-label {
            font-size: 0.85rem;
            color: #666;
            text-align: center;
            font-weight: 600;
            width: 100%;
        }

        .bar-value {
            font-size: 0.9rem;
            font-weight: 700;
            color: #D4A574;
        }

        .activity-log {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .activity-log-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: #333;
        }

        .activity-item {
            padding: 1rem;
            border-left: 3px solid #D4A574;
            margin-bottom: 1rem;
            background: #FEFAF6;
            border-radius: 8px;
        }

        .activity-time {
            color: #999;
            font-size: 0.85rem;
        }

        .activity-text {
            color: #333;
            margin-top: 0.3rem;
        }

        /* ===== USER SANCTIONS TAB ===== */
        .sanctions-header {
            margin-bottom: 2rem;
        }

        .add-sanction-btn {
            padding: 0.8rem 1.5rem;
            background: #F4845F;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .add-sanction-btn:hover {
            background: #E86E48;
            transform: translateY(-2px);
        }

        .sanctions-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .sanction-card {
            background: white;
            padding: 1.5rem;
            border-radius: 15px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 1rem;
            align-items: center;
        }

        .sanction-info {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .sanction-store {
            font-weight: 600;
            color: #333;
            font-size: 1rem;
        }

        .sanction-details {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            font-size: 0.9rem;
            color: #666;
        }

        .sanction-detail-item {
            display: flex;
            flex-direction: column;
        }

        .sanction-detail-label {
            color: #999;
            font-size: 0.8rem;
            margin-bottom: 0.2rem;
        }

        .sanction-status {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .sanction-active {
            background: #FFEBEE;
            color: #C62828;
        }

        .sanction-lifted {
            background: #E8F5E9;
            color: #2E7D32;
        }

        .sanction-actions {
            display: flex;
            gap: 0.5rem;
        }

        /* ===== TOAST NOTIFICATIONS ===== */
        .toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 2000;
            pointer-events: none;
        }

        .toast {
            background: white;
            padding: 1.2rem 1.5rem;
            border-radius: 10px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            animation: slideInRight 0.3s ease-out;
            pointer-events: auto;
            min-width: 300px;
        }

        .toast.success {
            border-left: 4px solid #27AE60;
        }

        .toast.success .toast-icon {
            color: #27AE60;
        }

        .toast.error {
            border-left: 4px solid #E74C3C;
        }

        .toast.error .toast-icon {
            color: #E74C3C;
        }

        .toast-icon {
            font-size: 1.3rem;
        }

        .toast-message {
            color: #333;
            font-weight: 500;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .navbar {
                padding: 0 1rem;
                gap: 1rem;
            }

            .navbar-brand {
                font-size: 1.1rem;
            }

            .navbar-tab {
                padding: 0 0.8rem;
                font-size: 0.9rem;
            }

            .admin-content {
                padding: 1rem;
            }

            .login-card {
                padding: 2rem 1.5rem;
            }

            .store-controls {
                flex-direction: column;
            }

            .search-box input {
                width: 100%;
            }

            .stores-table {
                font-size: 0.85rem;
            }

            .stores-table th,
            .stores-table td {
                padding: 0.8rem;
            }

            .action-btn {
                padding: 0.4rem 0.6rem;
                font-size: 0.75rem;
            }

            .modal-content {
                width: 95%;
                padding: 1.5rem;
            }

            .bar-chart {
                gap: 0.8rem;
            }

            .bar-item {
                max-width: 60px;
            }
        }
    </style>
    <script async src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <!-- LOGIN SCREEN -->
    <div class="login-screen" id="loginScreen">
        <div class="login-card">
            <div class="login-title">🔐 버터떡맵 관리자</div>
            <div class="login-subtitle">관리자 로그인</div>

            <div class="setup-mode" id="setupMode" style="display: none;">
                <div class="setup-hint">
                    🔑 첫 로그인입니다. 관리자 비밀번호를 설정해주세요.
                </div>
                <div class="form-group">
                    <label for="setupPass1">비밀번호</label>
                    <input type="password" id="setupPass1" placeholder="비밀번호를 입력하세요">
                </div>
                <div class="form-group">
                    <label for="setupPass2">비밀번호 확인</label>
                    <input type="password" id="setupPass2" placeholder="비밀번호를 다시 입력하세요">
                </div>
                <button class="login-button" onclick="handleSetupPassword()">비밀번호 설정</button>
            </div>

            <div class="login-mode" id="loginMode">
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="adminPassword">비밀번호</label>
                        <input type="password" id="adminPassword" placeholder="관리자 비밀번호를 입력하세요" autofocus>
                    </div>
                    <button type="submit" class="login-button">로그인</button>
                </form>
            </div>

            <div class="login-error" id="loginError"></div>
        </div>
    </div>

    <!-- ADMIN DASHBOARD -->
    <div class="admin-dashboard" id="adminDashboard">
        <!-- NAVBAR -->
        <nav class="navbar">
            <div class="navbar-brand">🧈 버터떡맵 관리자</div>
            <div class="navbar-tabs">
                <button class="navbar-tab active" onclick="switchTab('stores')">매장 관리</button>
                <button class="navbar-tab" onclick="switchTab('sanctions')">유저 제재</button>
                <button class="navbar-tab" onclick="switchTab('stats')">통계</button>
            </div>
            <button class="navbar-logout" onclick="handleLogout()">로그아웃</button>
        </nav>

        <!-- CONTENT AREA -->
        <div class="admin-content">
            <!-- STORE MANAGEMENT TAB -->
            <div class="tab-content active" id="storesTab">
                <div class="store-header">
                    <div class="summary-card">
                        <div class="summary-label">총 매장 수</div>
                        <div class="summary-value" id="totalStoresCount">42</div>
                    </div>
                    <div class="summary-card">
                        <div class="summary-label">기본 매장</div>
                        <div class="summary-value" id="defaultStoresCount">42</div>
                    </div>
                    <div class="summary-card custom">
                        <div class="summary-label">커스텀(유저등록) 매장</div>
                        <div class="summary-value" id="customStoresCount">0</div>
                    </div>

        function escapeHtml(text) {
            if (!text) return '';
            return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const icon = type === 'success' ? '✓' : '✕';
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<div class="toast-icon">${icon}</div><div class="toast-message">${escapeHtml(message)}</div>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'slideInRight 0.3s ease-out reverse';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        async function initializeAuth() {
            // Check localStorage FIRST (primary method, no Supabase dependency)
            let hasPassword = localStorage.getItem('buttertteokmapAdminPass');

            // If no password exists anywhere, set the default password
            if (!hasPassword) {
                const defaultPassword = 'butter1234';
                const encodedPassword = btoa(defaultPassword);
                localStorage.setItem('buttertteokmapAdminPass', encodedPassword);
                hasPassword = encodedPassword;

                // Show setup mode with default password hint
                document.getElementById('setupMode').style.display = 'block';
                document.getElementById('loginMode').style.display = 'none';

                // Show hint about default password
                const setupHint = document.querySelector('.setup-hint');
                if (setupHint) {
                    setupHint.innerHTML = '🔑 첫 로그인입니다. 기본 비밀번호: <strong>butter1234</strong><br>새 비밀번호를 설정해주세요.';
                }

                // Auto-fill the setup password fields with the default
                document.getElementById('setupPass1').value = defaultPassword;
                document.getElementById('setupPass2').value = defaultPassword;
            } else {
                // Password already exists, show login mode
                document.getElementById('setupMode').style.display = 'none';
                document.getElementById('loginMode').style.display = 'block';
            }

            // Also try to sync with Supabase in the background (non-blocking)
            if (supabase) {
                try {
                    const { data, error } = await supabase.from('admin_settings').select('setting_value').eq('setting_key', 'admin_password').single();
                    if (!error && data && !hasPassword) {
                        // Supabase has password but localStorage doesn't - sync it
                        localStorage.setItem('buttertteokmapAdminPass', data.setting_value);
                    }
                } catch (e) {
                    // Supabase not available, that's fine - we're using localStorage
                    console.log('Supabase 비밀번호 확인 불가 (정상, localStorage 사용 중)');
                }
            }
        }

        async function handleSetupPassword() {
            const pass1 = document.getElementById('setupPass1').value;
            const pass2 = document.getElementById('setupPass2').value;

            if (!pass1 || !pass2) {
                showToast('비밀번호를 입력해주세요.', 'error');
                return;
            }

            if (pass1 !== pass2) {
                showToast('비밀번호가 일치하지 않습니다.', 'error');
                return;
            }

            if (pass1.length < 4) {
                showToast('비밀번호는 4자 이상이어야 합니다.', 'error');
                return;
            }

            // SAVE TO localStorage FIRST (primary method)
            const encodedPassword = btoa(pass1);
            localStorage.setItem('buttertteokmapAdminPass', encodedPassword);

            // Then try to save to Supabase in background (non-blocking)
            if (supabase) {
                try {
                    await supabase.from('admin_settings').upsert(
                        { setting_key: 'admin_password', setting_value: encodedPassword },
                        { onConflict: 'setting_key' }
                    );
                    console.log('비밀번호가 Supabase에 저장되었습니다.');
                } catch (e) {
                    console.warn('Supabase 저장 실패 (localStorage에는 저장됨):', e);
                }
            }

            isAdminLoggedIn = true;
            showLoginSuccess();
            showToast('관리자 비밀번호가 설정되었습니다.', 'success');
        }

        async function handleLogin(e) {
            e.preventDefault();
            const password = document.getElementById('adminPassword').value;

            if (!password) {
                showError('비밀번호를 입력해주세요.');
                return;
            }

            // CHECK localStorage FIRST (primary method)
            const storedPassword = localStorage.getItem('buttertteokmapAdminPass');
            const encodedInput = btoa(password);

            if (storedPassword && encodedInput === storedPassword) {
                // localStorage password matches
                isAdminLoggedIn = true;
                showLoginSuccess();
                return;
            }

            // If localStorage doesn't match, try Supabase in background (non-blocking)
            if (supabase) {
                try {
                    const { data, error } = await supabase.from('admin_settings')
                        .select('setting_value').eq('setting_key', 'admin_password').single();

                    if (!error && data && encodedInput === data.setting_value) {
                        // Supabase password matches - sync to localStorage
                        localStorage.setItem('buttertteokmapAdminPass', data.setting_value);
                        isAdminLoggedIn = true;
                        showLoginSuccess();
                        return;
                    }
                } catch (e) {
                    console.log('Supabase 확인 불가 (정상, localStorage 사용 중)');
                }
            }

            // No match found anywhere
            showError('비밀번호가 일치하지 않습니다.');
        }

            const errorEl = document.getElementById('loginError');

                const { data: stores, error: storesError } = await supabase.from('stores').select('*').order('id');
                if (storesError) throw storesError;

                // Separate default and custom stores
                allStoresData = stores?.filter(s => !s.is_custom) || [...allStores];
                customStoresData = stores?.filter(s => s.is_custom) || [];

                // Load sanctions from Supabase
                const { data: sanctions, error: sanctionsError } = await supabase.from('sanctions').select('*').order('created_at', { ascending: false });
                if (sanctionsError) throw sanctionsError;
                sanctionsData = sanctions || [];

                allStoresDisplay = [...allStoresData, ...customStoresData];
            } catch (e) {
                console.warn('Supabase 로드 실패, 로컬스토리지 사용:', e);
                // Fallback to localStorage and hardcoded data
                allStoresData = [...allStores];
                customStoresData = JSON.parse(localStorage.getItem('buttertteokmapCustomStores') || '[]');
                sanctionsData = JSON.parse(localStorage.getItem('buttertteokmapSanctions') || '[]');
                allStoresDisplay = [...allStoresData, ...customStoresData];
            }
        }

        function getStoreById(id) {
            return allStoresData.find(s => s.id === id) || customStoresData.find(s => s.id === id);
        }

        function isStoreBanned(id) {
            const store = allStoresDisplay.find(s => s.id === id);
            if (store && store.is_banned !== undefined) {
                return store.is_banned;
            }
            // Fallback to localStorage
            return localStorage.getItem(`buttertteokmapStoreBanned_${id}`) === 'true';
        }

        async function toggleStoreBan(id) {
            if (!supabase) return undefined;
            const isBanned = isStoreBanned(id);
            const newBanStatus = !isBanned;

            try {
                const { error } = await supabase.from('stores').update({ is_banned: newBanStatus }).eq('id', id);
                if (error) throw error;

                const store = allStoresDisplay.find(s => s.id === id);
                if (store) {
                    store.is_banned = newBanStatus;
                }

                showToast(newBanStatus ? '매장이 정지되었습니다.' : '매장이 복원되었습니다.', 'success');
            } catch (e) {
                console.warn('Supabase 업데이트 실패, 로컬스토리지 사용:', e);
                // Fallback to localStorage
                if (isBanned) {
                    localStorage.removeItem(`buttertteokmapStoreBanned_${id}`);
                    showToast('매장이 복원되었습니다.', 'success');
                } else {
                    localStorage.setItem(`buttertteokmapStoreBanned_${id}`, 'true');
                    showToast('매장이 정지되었습니다.', 'success');
                }
            }
            renderStores();
        }

        function deleteCustomStore(id) {
            showConfirmDialog(
                '매장 삭제',
                '이 커스텀 매장을 삭제하시겠습니까?',
                async () => {
                    if (!supabase) return undefined;
                    try {
                        const { error } = await supabase.from('stores').delete().eq('id', id);
                        if (error) throw error;

                        customStoresData = customStoresData.filter(s => s.id !== id);
                        allStoresDisplay = allStoresDisplay.filter(s => s.id !== id);
                        showToast('매장이 삭제되었습니다.', 'success');
                    } catch (e) {
                        console.warn('Supabase 삭제 실패, 로컬스토리지 사용:', e);
                        // Fallback to localStorage
                        customStoresData = customStoresData.filter(s => s.id !== id);
                        localStorage.setItem('buttertteokmapCustomStores', JSON.stringify(customStoresData));
                        showToast('매장이 삭제되었습니다.', 'success');
                    }
                    renderStores();
                }
            );
        }

        function showConfirmDialog(title, message, onConfirm) {
            document.getElementById('confirmTitle').textContent = title;
            document.getElementById('confirmMessage').textContent = message;
            pendingAction = onConfirm;
            openModal('confirmDialog');
        }

        function executeConfirmedAction() {
            if (pendingAction) {
                pendingAction();
                pendingAction = null;
            }
            closeModal('confirmDialog');
        }

        // ===== STORE MANAGEMENT =====
        function renderStores() {
            const tbody = document.getElementById('storesTableBody');
            const allStoresDisplay = [...allStoresData, ...customStoresData];

            // Update summary cards
            document.getElementById('totalStoresCount').textContent = allStoresDisplay.length;
            document.getElementById('defaultStoresCount').textContent = allStoresData.length;
            document.getElementById('customStoresCount').textContent = customStoresData.length;

            let bannedCount = 0;
            allStoresDisplay.forEach(store => {
                if (isStoreBanned(store.id)) bannedCount++;
            });
            document.getElementById('bannedStoresCount').textContent = bannedCount;

            // Render table
            tbody.innerHTML = allStoresDisplay.map(store => {
                const type = allStoresData.find(s => s.id === store.id) ? 'default' : 'custom';
                const isBanned = isStoreBanned(store.id);
                const status = isBanned ? '정지' : '정상';
                const statusClass = isBanned ? 'status-banned' : 'status-normal';
                const statusDot = isBanned ? '🔴' : '🟢';

                return `
                    <tr>
                        <td>${store.id}</td>
                        <td class="store-name">${escapeHtml(store.name)}</td>
                        <td>${escapeHtml(store.addr)}</td>
                        <td>${escapeHtml(store.region)}</td>
                        <td><span class="store-type-badge type-${type}">${type === 'default' ? '기본' : '유저등록'}</span></td>
                        <td><span class="store-status ${statusClass}"><span class="status-dot">${statusDot}</span>${status}</span></td>
                        <td class="store-actions">
                            <button class="action-btn" onclick="showStoreDetail(${store.id})">👁️</button>
                            <button class="action-btn" onclick="toggleStoreBan(${store.id})">${isBanned ? '▶️' : '⏸️'}</button>
                            ${type === 'custom' ? `<button class="action-btn danger" onclick="deleteCustomStore(${store.id})">🗑️</button>` : ''}
                            <button class="action-btn" onclick="openEditStoreModal(${store.id})">✏️</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function filterStores() {
            const query = document.getElementById('storeSearchInput').value.toLowerCase();
            const tbody = document.getElementById('storesTableBody');
            const allStoresDisplay = [...allStoresData, ...customStoresData];

            const filtered = allStoresDisplay.filter(store => {
                return store.name.toLowerCase().includes(query) ||
                       store.addr.toLowerCase().includes(query) ||
                       store.region.toLowerCase().includes(query);
            });

            tbody.innerHTML = filtered.map(store => {
                const type = allStoresData.find(s => s.id === store.id) ? 'default' : 'custom';
                const isBanned = isStoreBanned(store.id);
                const status = isBanned ? '정지' : '정상';
                const statusClass = isBanned ? 'status-banned' : 'status-normal';
                const statusDot = isBanned ? '🔴' : '🟢';

                return `
                    <tr>
                        <td>${store.id}</td>
                        <td class="store-name">${escapeHtml(store.name)}</td>
                        <td>${escapeHtml(store.addr)}</td>
                        <td>${escapeHtml(store.region)}</td>
                        <td><span class="store-type-badge type-${type}">${type === 'default' ? '기본' : '유저등록'}</span></td>
                        <td><span class="store-status ${statusClass}"><span class="status-dot">${statusDot}</span>${status}</span></td>
                        <td class="store-actions">
                            <button class="action-btn" onclick="showStoreDetail(${store.id})">👁️</button>
                            <button class="action-btn" onclick="toggleStoreBan(${store.id})">${isBanned ? '▶️' : '⏸️'}</button>
                            ${type === 'custom' ? `<button class="action-btn danger" onclick="deleteCustomStore(${store.id})">🗑️</button>` : ''}
                            <button class="action-btn" onclick="openEditStoreModal(${store.id})">✏️</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function sortStores() {
            const sortBy = document.getElementById('sortSelect').value;
            const allStoresDisplay = [...allStoresData, ...customStoresData];

            if (sortBy === 'name') {
                allStoresDisplay.sort((a, b) => a.name.localeCompare(b.name, 'ko'));
            } else if (sortBy === 'region') {
                allStoresDisplay.sort((a, b) => a.region.localeCompare(b.region, 'ko'));
            } else if (sortBy === 'type') {
                allStoresDisplay.sort((a, b) => {
                    const typeA = allStoresData.find(s => s.id === a.id) ? 'default' : 'custom';
                    const typeB = allStoresData.find(s => s.id === b.id) ? 'default' : 'custom';
                    return typeA.localeCompare(typeB, 'ko');
                });
            }

            const tbody = document.getElementById('storesTableBody');
            tbody.innerHTML = allStoresDisplay.map(store => {
                const type = allStoresData.find(s => s.id === store.id) ? 'default' : 'custom';
                const isBanned = isStoreBanned(store.id);
                const status = isBanned ? '정지' : '정상';
                const statusClass = isBanned ? 'status-banned' : 'status-normal';
                const statusDot = isBanned ? '🔴' : '🟢';

                return `
                    <tr>
                        <td>${store.id}</td>
                        <td class="store-name">${escapeHtml(store.name)}</td>
                        <td>${escapeHtml(store.addr)}</td>
                        <td>${escapeHtml(store.region)}</td>
                        <td><span class="store-type-badge type-${type}">${type === 'default' ? '기본' : '유저등록'}</span></td>
                        <td><span class="store-status ${statusClass}"><span class="status-dot">${statusDot}</span>${status}</span></td>
                        <td class="store-actions">
                            <button class="action-btn" onclick="showStoreDetail(${store.id})">👁️</button>
                            <button class="action-btn" onclick="toggleStoreBan(${store.id})">${isBanned ? '▶️' : '⏸️'}</button>
                            ${type === 'custom' ? `<button class="action-btn danger" onclick="deleteCustomStore(${store.id})">🗑️</button>` : ''}
                            <button class="action-btn" onclick="openEditStoreModal(${store.id})">✏️</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function showStoreDetail(id) {
            const store = getStoreById(id);
            if (!store) return;

            const type = allStoresData.find(s => s.id === id) ? '기본' : '유저등록';
            const isBanned = isStoreBanned(id);
            const detailContent = document.getElementById('storeDetailContent');

            detailContent.innerHTML = `
                <div style="display: grid; gap: 1rem;">
                    <div>
                        <label style="color: #999; font-size: 0.9rem;">ID</label>
                        <div style="font-size: 1.1rem; font-weight: 600; color: #333;">${store.id}</div>
                    </div>
                    <div>
                        <label style="color: #999; font-size: 0.9rem;">매장명</label>
                        <div style="font-size: 1.1rem; font-weight: 600; color: #333;">${escapeHtml(store.name)}</div>
                    </div>
                    <div>
                        <label style="color: #999; font-size: 0.9rem;">주소</label>
                        <div style="font-size: 1rem; color: #666;">${escapeHtml(store.addr)}</div>
                    </div>
                    <div>
                        <label style="color: #999; font-size: 0.9rem;">지역</label>
                        <div style="font-size: 1rem; color: #666;">${escapeHtml(store.region)} - ${escapeHtml(store.area)}</div>
                    </div>
                    <div>
                        <label style="color: #999; font-size: 0.9rem;">등록유형</label>
                        <span class="store-type-badge type-${type === '기본' ? 'default' : 'custom'}">${type}</span>
                    </div>
                    <div>
                        <label style="color: #999; font-size: 0.9rem;">상태</label>
                        <div style="display: flex; align-items: center; gap: 0.5rem; margin-top: 0.3rem;">
                            <span style="font-size: 1.2rem;">${isBanned ? '🔴' : '🟢'}</span>
                            <span style="font-weight: 600; color: ${isBanned ? '#C62828' : '#2E7D32'};font-size: 1rem;">${isBanned ? '정지됨' : '정상'}</span>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('storeDetailTitle').textContent = `${escapeHtml(store.name)} - 상세정보`;
            openModal('storeDetailModal');
        }

        function openEditStoreModal(id) {
            currentEditStoreId = id;
            const store = getStoreById(id);
            if (!store) return;

            document.getElementById('editStoreName').value = store.name;
            document.getElementById('editStoreAddr').value = store.addr;
            document.getElementById('editStoreRegion').value = store.region;
            openModal('editStoreModal');
        }

        async function saveStoreEdit() {
            if (!supabase) return undefined;
            const name = document.getElementById('editStoreName').value;
            const addr = document.getElementById('editStoreAddr').value;
            const region = document.getElementById('editStoreRegion').value;

            if (!name || !addr || !region) {
                showToast('모든 필드를 입력해주세요.', 'error');
                return;
            }

            try {
                const { error } = await supabase.from('stores').update({ name, addr, region }).eq('id', currentEditStoreId);
                if (error) throw error;

                const store = getStoreById(currentEditStoreId);
                if (store) {
                    store.name = name;
                    store.addr = addr;
                    store.region = region;
                }

                closeModal('editStoreModal');
                renderStores();
                showToast('매장 정보가 수정되었습니다.', 'success');
            } catch (e) {
                console.warn('Supabase 업데이트 실패, 로컬스토리지 사용:', e);
                // Fallback to localStorage
                const store = getStoreById(currentEditStoreId);
                if (store) {
                    store.name = name;
                    store.addr = addr;
                    store.region = region;

                    const isCustom = customStoresData.find(s => s.id === currentEditStoreId);
                    if (isCustom) {
                        localStorage.setItem('buttertteokmapCustomStores', JSON.stringify(customStoresData));
                    }
                }
                closeModal('editStoreModal');
                renderStores();
                showToast('매장 정보가 수정되었습니다.', 'success');
            }
        }

        // ===== SANCTIONS MANAGEMENT =====
        function renderSanctions() {
            const list = document.getElementById('sanctionsList');

            if (sanctionsData.length === 0) {
                list.innerHTML = '<div style="text-align: center; color: #999; padding: 2rem;">제재 기록이 없습니다.</div>';
                return;
            }

            list.innerHTML = sanctionsData.map((sanction, idx) => {
                const statusClass = sanction.status === 'active' ? 'sanction-active' : 'sanction-lifted';
                const statusText = sanction.status === 'active' ? '정지중' : '해제됨';

                return `
                    <div class="sanction-card">
                        <div class="sanction-info">
                            <div class="sanction-store">${escapeHtml(sanction.storeName)}</div>
                            <div class="sanction-details">
                                <div class="sanction-detail-item">
                                    <div class="sanction-detail-label">제재일</div>
                                    <div>${sanction.date}</div>
                                </div>
                                <div class="sanction-detail-item">
                                    <div class="sanction-detail-label">사유</div>
                                    <div>${escapeHtml(sanction.reason)}</div>
                                </div>
                                <div class="sanction-detail-item">
                                    <span class="sanction-status ${statusClass}">${statusText}</span>
                                </div>
                            </div>
                        </div>
                        <div class="sanction-actions">
                            ${sanction.status === 'active' ? `<button class="action-btn" onclick="liftSanction(${idx})">해제하기</button>` : ''}
                            <button class="action-btn danger" onclick="deleteSanction(${idx})">삭제</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function openAddSanctionModal() {
            const allStoresDisplay = [...allStoresData, ...customStoresData];
            const select = document.getElementById('sanctionStoreSelect');
            select.innerHTML = '<option value="">-- 매장을 선택하세요 --</option>' +
                allStoresDisplay.map(store => `<option value="${store.id}|${escapeHtml(store.name)}">${escapeHtml(store.name)}</option>`).join('');

            document.getElementById('sanctionReason').value = '';
            openModal('addSanctionModal');
        }

        async function saveSanction() {
            if (!supabase) return undefined;
            const storeSelect = document.getElementById('sanctionStoreSelect').value;
            const reason = document.getElementById('sanctionReason').value;

            if (!storeSelect || !reason) {
                showToast('매장과 사유를 모두 입력해주세요.', 'error');
                return;
            }

            const [storeId, storeName] = storeSelect.split('|');
            const newSanction = {
                store_id: parseInt(storeId),
                store_name: storeName,
                reason: reason,
                status: 'active'
            };

            try {
                const { data, error } = await supabase.from('sanctions').insert([newSanction]).select();
                if (error) throw error;

                if (data && data[0]) {
                    sanctionsData.push({
                        id: data[0].id,
                        storeId: data[0].store_id,
                        storeName: data[0].store_name,
                        reason: data[0].reason,
                        date: new Date(data[0].created_at).toLocaleDateString('ko-KR'),
                        status: data[0].status
                    });
                }

                closeModal('addSanctionModal');
                renderSanctions();
                showToast('제재가 추가되었습니다.', 'success');
            } catch (e) {
                console.warn('Supabase 저장 실패, 로컬스토리지 사용:', e);
                // Fallback to localStorage
                const newSanctionLocal = {
                    id: Date.now(),
                    storeId: parseInt(storeId),
                    storeName: storeName,
                    reason: reason,
                    date: new Date().toLocaleDateString('ko-KR'),
                    status: 'active'
                };
                sanctionsData.push(newSanctionLocal);
                localStorage.setItem('buttertteokmapSanctions', JSON.stringify(sanctionsData));
                closeModal('addSanctionModal');
                renderSanctions();
                showToast('제재가 추가되었습니다.', 'success');
            }
        }

        async function liftSanction(idx) {
            if (!supabase) return undefined;
            if (sanctionsData[idx]) {
                const sanctionId = sanctionsData[idx].id;

                try {
                    const { error } = await supabase.from('sanctions').update({ status: 'lifted' }).eq('id', sanctionId);
                    if (error) throw error;

                    sanctionsData[idx].status = 'lifted';
                    renderSanctions();
                    showToast('제재가 해제되었습니다.', 'success');
                } catch (e) {
                    console.warn('Supabase 업데이트 실패, 로컬스토리지 사용:', e);
                    // Fallback to localStorage
                    sanctionsData[idx].status = 'lifted';
                    localStorage.setItem('buttertteokmapSanctions', JSON.stringify(sanctionsData));
                    renderSanctions();
                    showToast('제재가 해제되었습니다.', 'success');
                }
            }
        }

        function deleteSanction(idx) {
            showConfirmDialog(
                '제재 삭제',
                '이 제재 기록을 삭제하시겠습니까?',
                async () => {
                    if (!supabase) return undefined;
                    const sanctionId = sanctionsData[idx].id;

                    try {
                        const { error } = await supabase.from('sanctions').delete().eq('id', sanctionId);
                        if (error) throw error;

                        sanctionsData.splice(idx, 1);
                        renderSanctions();
                        showToast('제재가 삭제되었습니다.', 'success');
                    } catch (e) {
                        console.warn('Supabase 삭제 실패, 로컬스토리지 사용:', e);
                        // Fallback to localStorage
                        sanctionsData.splice(idx, 1);
                        localStorage.setItem('buttertteokmapSanctions', JSON.stringify(sanctionsData));
                        renderSanctions();
                        showToast('제재가 삭제되었습니다.', 'success');
                    }
                }
            );
        }

        // ===== STATISTICS =====
        async function renderStatistics() {
            if (!supabase) return undefined;
            const allStoresDisplay = [...allStoresData, ...customStoresData];

            // Update stat cards
            document.getElementById('statTotalStores').textContent = allStoresDisplay.length;
            document.getElementById('statCustomStores').textContent = customStoresData.length;

            let bannedCount = 0;
            allStoresDisplay.forEach(store => {
                if (isStoreBanned(store.id)) bannedCount++;
            });
            document.getElementById('statBannedStores').textContent = bannedCount;

            // Count coupons from Supabase
            let couponCount = 0;
            try {
                const { data: coupons, error } = await supabase.from('coupons').select('id', { count: 'exact' });
                if (error) throw error;
                couponCount = coupons?.length || 0;
            } catch (e) {
                console.warn('Supabase 쿠폰 조회 실패, 로컬스토리지 사용:', e);
                // Fallback to localStorage
                allStoresDisplay.forEach(store => {
                    const coupons = JSON.parse(localStorage.getItem(`buttertteokmapCoupons_${store.id}`) || '[]');
                    couponCount += coupons.length;
                });
            }
            document.getElementById('statCoupons').textContent = couponCount;

            // Render region chart
            const regionCounts = {};
            allStoresDisplay.forEach(store => {
                regionCounts[store.region] = (regionCounts[store.region] || 0) + 1;
            });

            const regions = Object.keys(regionCounts).sort();
            const maxCount = Math.max(...Object.values(regionCounts));

            const chart = document.getElementById('regionChart');
            chart.innerHTML = regions.map(region => {
                const count = regionCounts[region];
                const height = (count / maxCount) * 250;
                return `
                    <div class="bar-item">
                        <div class="bar" style="height: ${height}px;"></div>
                        <div class="bar-value">${count}</div>
                        <div class="bar-label">${region}</div>
                    </div>
                `;
            }).join('');

            // Render activity log
            const activityLog = document.getElementById('activityLog');
            const activities = [
                { text: '관리자 페이지 접속', time: new Date().toLocaleString('ko-KR') },
                { text: `총 ${allStoresDisplay.length}개 매장 모니터링 중`, time: '지속중' }
            ];

            // Add recent sanctions
            if (sanctionsData.length > 0) {
                const recentSanction = sanctionsData[sanctionsData.length - 1];
                activities.unshift({ text: `[제재] ${recentSanction.storeName}`, time: recentSanction.date });
            }

            activityLog.innerHTML = activities.slice(0, 5).map(activity => `
                <div class="activity-item">
                    <div class="activity-text">${escapeHtml(activity.text)}</div>
                    <div class="activity-time">${escapeHtml(activity.time)}</div>
                </div>
            `).join('');
        }

        // ===== INITIALIZATION =====
        window.addEventListener('DOMContentLoaded', () => {
            initializeAuth();
        });

        // Close modals when clicking outside
        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.remove('active');
                }
            });
        });
    </script>
</body>
</html>
