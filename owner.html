<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="description" content="버터떡맵 사장님 전용 로그인 페이지. 버터떡 매장 운영자를 위한 재고 관리 및 로그인 서비스입니다.">
    <title>버터떡맵 - 사장님 전용 로그인</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧈</text></svg>">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primary: #D4A574;
            --color-secondary: #8B5E3C;
            --color-accent: #F4845F;
            --color-bg: #FEFAF6;
            --color-card: #FFFFFF;
            --color-text-primary: #2D2016;
            --color-text-secondary: #7A6B5D;
            --color-success: #6BAF7B;
            --color-warning: #E8B84B;
            --color-danger: #E85D5D;
            --border-radius-lg: 16px;
            --border-radius-md: 12px;
            --border-radius-pill: 24px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Pretendard Variable', 'Noto Sans KR', sans-serif;
            background-color: var(--color-bg);
            color: var(--color-text-primary);
            overflow-x: hidden;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: transparent;
        }

        .back-button {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
            color: var(--color-text-secondary);
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .back-button:hover {
            color: var(--color-accent);
            transform: translateX(-4px);
        }

        .settings-icon {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 50%;
            position: relative;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
        }

        .settings-icon:hover {
            background-color: rgba(212, 165, 116, 0.15);
            transform: rotate(20deg);
        }

        .settings-icon svg {
            width: 24px;
            height: 24px;
            stroke: var(--color-secondary);
            stroke-width: 2;
            fill: none;
        }

        .settings-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            background: white;
            border-radius: var(--border-radius-md);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
            min-width: 200px;
            margin-top: 12px;
            z-index: 100;
            display: none;
            overflow: hidden;
            border: 1px solid rgba(212, 165, 116, 0.2);
        }

        .settings-dropdown.active {
            display: block;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .dropdown-item {
            padding: 14px 18px;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            cursor: pointer;
            font-family: 'Pretendard Variable', 'Noto Sans KR', sans-serif;
            font-size: 14px;
            color: var(--color-text-primary);
            border-bottom: 1px solid rgba(212, 165, 116, 0.1);
            transition: background-color 0.2s ease;
            font-weight: 500;
        }

        .dropdown-item:last-child {
            border-bottom: none;
        }

        .dropdown-item:hover {
            background-color: rgba(212, 165, 116, 0.08);
            color: var(--color-accent);
        }

        .dropdown-item.logout {
            color: var(--color-danger);
        }

        .dropdown-item.logout:hover {
            background-color: rgba(232, 93, 93, 0.08);
        }

        /* Main Layout */
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 100vh;
            padding-top: 0;
        }

        /* Illustration Section */
        .illustration-section {
            background: linear-gradient(135deg, #D4A574 0%, #F4845F 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            padding: 60px 40px;
        }

        .illustration-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(255, 255, 255, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(255, 255, 255, 0.05) 0%, transparent 50%);
            pointer-events: none;
        }

        .illustration-container {
            position: relative;
            z-index: 2;
            text-align: center;
            max-width: 100%;
        }

        /* Butter Tteok Illustration (CSS Only) */
        .tteok-illustration {
            width: 140px;
            height: 140px;
            margin: 0 auto 40px;
            position: relative;
            animation: floatAnimation 3s ease-in-out infinite;
        }

        @keyframes floatAnimation {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        .tteok-svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 8px 20px rgba(0, 0, 0, 0.2));
        }

        /* Floating Particles */
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }

        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: drift 6s ease-in-out infinite;
        }

        .particle:nth-child(1) {
            width: 8px;
            height: 8px;
            top: 20%;
            left: 10%;
            animation-delay: 0s;
        }

        .particle:nth-child(2) {
            width: 6px;
            height: 6px;
            top: 60%;
            right: 15%;
            animation-delay: 1s;
        }

        .particle:nth-child(3) {
            width: 10px;
            height: 10px;
            top: 40%;
            right: 10%;
            animation-delay: 2s;
        }

        .particle:nth-child(4) {
            width: 7px;
            height: 7px;
            bottom: 20%;
            left: 20%;
            animation-delay: 1.5s;
        }

        @keyframes drift {
            0%, 100% {
                transform: translate(0, 0);
                opacity: 0.3;
            }
            50% {
                transform: translate(20px, 30px);
                opacity: 0.6;
            }
        }

        .illustration-text {
            color: white;
            position: relative;
            z-index: 3;
        }

        .illustration-tagline {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.3;
            letter-spacing: -0.5px;
        }

        .illustration-subtitle {
            font-size: 16px;
            opacity: 0.95;
            font-weight: 500;
            letter-spacing: -0.3px;
        }

        /* Login Form Section */
        .form-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 40px;
            background: var(--color-bg);
        }

        .login-container {
            width: 100%;
            max-width: 380px;
            animation: slideInFromRight 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slideInFromRight {
            from {
                opacity: 0;
                transform: translateX(40px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .login-header {
            margin-bottom: 36px;
            text-align: center;
        }

        .login-title-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .login-title {
            font-size: 32px;
            font-weight: 700;
            color: var(--color-text-primary);
            letter-spacing: -0.5px;
        }

        .mini-tteok {
            width: 32px;
            height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .login-subtitle {
            font-size: 15px;
            color: var(--color-text-secondary);
            font-weight: 500;
            line-height: 1.5;
        }

        /* Alert Messages */
        .alert-message {
            margin-bottom: 20px;
            padding: 14px 16px;
            border-radius: var(--border-radius-md);
            font-size: 14px;
            animation: slideDown 0.3s ease;
            font-weight: 500;
            border-left: 4px solid;
        }

        .alert-error {
            background-color: rgba(232, 93, 93, 0.1);
            color: #991B1B;
            border-left-color: var(--color-danger);
        }

        .alert-success {
            background-color: rgba(107, 175, 123, 0.1);
            color: #166534;
            border-left-color: var(--color-success);
        }

        /* Loading State */
        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2.5px solid rgba(255, 255, 255, 0.3);
            border-top: 2.5px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Login Methods */
        .login-methods {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }

        .social-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px 20px;
            border: none;
            border-radius: var(--border-radius-md);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            font-family: 'Pretendard Variable', 'Noto Sans KR', sans-serif;
            position: relative;
            overflow: hidden;
            height: 56px;
        }

        .social-button:active:not(:disabled) {
            transform: scale(0.98);
        }

        .social-button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .social-button:not(:disabled):hover {
            transform: translateY(-2px);
        }

        /* Google Button */
        .google-button {
            background-color: white;
            color: #1F2937;
            border: 1.5px solid #E5E7EB;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .google-button:hover:not(:disabled) {
            background-color: #F9FAFB;
            border-color: #D1D5DB;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
        }

        /* Kakao Button */
        .kakao-button {
            background-color: #FEE500;
            color: #000000;
            box-shadow: 0 2px 8px rgba(254, 229, 0, 0.2);
        }

        .kakao-button:hover:not(:disabled) {
            background-color: #FDD835;
            box-shadow: 0 8px 24px rgba(254, 229, 0, 0.3);
        }

        /* Naver Button */
        .naver-button {
            background-color: #03C75A;
            color: white;
            box-shadow: 0 2px 8px rgba(3, 199, 90, 0.2);
        }

        .naver-button:hover:not(:disabled) {
            background-color: #05B34E;
            box-shadow: 0 8px 24px rgba(3, 199, 90, 0.3);
        }

        .button-icon {
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .button-icon svg {
            width: 100%;
            height: 100%;
        }

        /* Divider */
        .divider-container {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--color-text-secondary), transparent);
            opacity: 0.3;
        }

        .divider-text {
            font-size: 14px;
            color: var(--color-text-secondary);
            font-weight: 500;
        }

        /* Guest Mode Link */
        .guest-mode {
            text-align: center;
            margin-bottom: 32px;
        }

        .guest-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--color-secondary);
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .guest-link:hover {
            color: var(--color-accent);
            gap: 10px;
        }

        .guest-arrow {
            transition: transform 0.3s ease;
        }

        .guest-link:hover .guest-arrow {
            transform: translateX(4px);
        }

        /* Bottom Links */
        .bottom-links {
            display: flex;
            flex-direction: column;
            gap: 14px;
            text-align: center;
            margin-top: 40px;
            padding-top: 32px;
            border-top: 1px solid rgba(212, 165, 116, 0.2);
        }

        .bottom-link {
            color: var(--color-text-secondary);
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s ease;
            cursor: pointer;
            font-weight: 500;
        }

        .bottom-link:hover {
            color: var(--color-accent);
        }

        /* Footer */
        .footer-section {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid rgba(212, 165, 116, 0.2);
            text-align: center;
        }

        .footer-text {
            font-size: 14px;
            color: var(--color-text-secondary);
            line-height: 1.6;
            margin-bottom: 12px;
        }

        .footer-contact {
            font-size: 13px;
            color: var(--color-primary);
            font-weight: 600;
        }

        .copyright {
            font-size: 12px;
            color: var(--color-text-secondary);
            margin-top: 16px;
            opacity: 0.7;
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .main-layout {
                grid-template-columns: 1fr;
            }

            .illustration-section {
                padding: 40px 30px;
                min-height: 280px;
            }

            .form-section {
                padding: 40px 30px;
                min-height: auto;
            }

            .login-container {
                max-width: 100%;
            }

            .tteok-illustration {
                width: 100px;
                height: 100px;
            }

            .illustration-tagline {
                font-size: 24px;
            }

            .illustration-subtitle {
                font-size: 14px;
            }
        }

        @media (max-width: 768px) {
            .header {
                padding: 16px 20px;
            }

            .illustration-section {
                padding: 30px 20px;
                min-height: 200px;
                justify-content: flex-start;
                padding-top: 80px;
            }

            .form-section {
                padding: 30px 20px;
                min-height: auto;
            }

            .login-container {
                max-width: 100%;
                animation: none;
            }

            .tteok-illustration {
                width: 80px;
                height: 80px;
                margin-bottom: 20px;
            }

            .illustration-tagline {
                font-size: 20px;
                margin-bottom: 8px;
            }

            .illustration-subtitle {
                font-size: 13px;
            }

            .login-title {
                font-size: 28px;
            }

            .login-subtitle {
                font-size: 14px;
            }

            .social-button {
                font-size: 15px;
                padding: 14px 18px;
                height: 50px;
            }

            .button-icon {
                width: 20px;
                height: 20px;
            }

            .bottom-links {
                gap: 12px;
            }

            .bottom-link {
                font-size: 13px;
            }
        }

        @media (max-width: 480px) {
            .header {
                padding: 14px 16px;
            }

            .illustration-section {
                padding: 20px 16px;
                padding-top: 70px;
                min-height: 160px;
            }

            .form-section {
                padding: 24px 16px;
            }

            .login-header {
                margin-bottom: 28px;
            }

            .tteok-illustration {
                width: 70px;
                height: 70px;
                margin-bottom: 16px;
            }

            .illustration-tagline {
                font-size: 18px;
            }

            .login-title {
                font-size: 24px;
            }

            .login-methods {
                gap: 10px;
                margin-bottom: 20px;
            }

            .social-button {
                font-size: 14px;
                padding: 12px 16px;
                height: 48px;
            }

            .button-icon {
                width: 18px;
                height: 18px;
            }

            .login-subtitle {
                font-size: 13px;
            }

            .bottom-links {
                gap: 10px;
                margin-top: 30px;
            }

            .footer-text {
                font-size: 13px;
            }
        }

        /* Stagger Animation */
        @keyframes staggerIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .social-button {
            animation: staggerIn 0.6s ease forwards;
        }

        .social-button:nth-child(1) {
            animation-delay: 0.2s;
        }

        .social-button:nth-child(2) {
            animation-delay: 0.3s;
        }

        .social-button:nth-child(3) {
            animation-delay: 0.4s;
        }

        .divider-container {
            animation: staggerIn 0.6s ease 0.5s forwards;
            opacity: 0;
        }

        .guest-mode {
            animation: staggerIn 0.6s ease 0.6s forwards;
            opacity: 0;
        }

        .bottom-links {
            animation: staggerIn 0.6s ease 0.7s forwards;
            opacity: 0;
        }

        .footer-section {
            animation: staggerIn 0.6s ease 0.8s forwards;
            opacity: 0;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <a href="index.html" class="back-button">← 지도로 돌아가기</a>
        <div class="settings-icon" onclick="toggleSettingsDropdown()" aria-label="설정 메뉴">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <circle cx="12" cy="12" r="2"/>
                <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.64l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22l-1.92 3.32c-.13.23-.07.5.12.64l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.64l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.5-.12-.64l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z" fill="currentColor" stroke="none"/>
            </svg>
            <div class="settings-dropdown" id="settingsDropdown">
                <button class="dropdown-item" aria-label="프로필 보기" onclick="toggleSettingsDropdown(); alert('프로필 기능은 준비 중입니다.')">프로필 보기</button>
                <button class="dropdown-item logout" id="logoutBtn" aria-label="로그아웃" onclick="handleLogout()" style="display: none;">로그아웃</button>
            </div>
        </div>
    </div>

    <!-- Main Layout -->
    <div class="main-layout">
        <!-- Illustration Section -->
        <div class="illustration-section">
            <div class="particles">
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
            </div>

            <div class="illustration-container">
                <!-- Butter Tteok SVG -->
                <div class="tteok-illustration">
                    <svg class="tteok-svg" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
                        <!-- Butter tteok base -->
                        <defs>
                            <linearGradient id="tteokGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" style="stop-color:#FDF5E6;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#F5E6CC;stop-opacity:1" />
                            </linearGradient>
                            <filter id="tteokShadow">
                                <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.2"/>
                            </filter>
                        </defs>

                        <!-- Main tteok shape (rounded rectangle) -->
                        <rect x="30" y="40" width="100" height="70" rx="20" ry="20" fill="url(#tteokGradient)" filter="url(#tteokShadow)"/>

                        <!-- Butter drizzle on top -->
                        <ellipse cx="55" cy="35" rx="12" ry="10" fill="#FFE680" opacity="0.9"/>
                        <ellipse cx="80" cy="32" rx="14" ry="9" fill="#FFE680" opacity="0.85"/>
                        <ellipse cx="105" cy="36" rx="11" ry="10" fill="#FFE680" opacity="0.9"/>

                        <!-- Cinnamon sugar coating (subtle texture) -->
                        <circle cx="50" cy="60" r="2" fill="#D4844F" opacity="0.6"/>
                        <circle cx="75" cy="55" r="1.5" fill="#D4844F" opacity="0.5"/>
                        <circle cx="95" cy="65" r="2" fill="#D4844F" opacity="0.6"/>
                        <circle cx="60" cy="85" r="1.5" fill="#D4844F" opacity="0.5"/>
                        <circle cx="110" cy="80" r="2" fill="#D4844F" opacity="0.6"/>

                        <!-- Highlight/shine -->
                        <ellipse cx="55" cy="55" rx="25" ry="15" fill="white" opacity="0.15"/>
                    </svg>
                </div>

                <!-- Illustration Text -->
                <div class="illustration-text">

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <!-- Kakao SDK -->
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.4/kakao.min.js"></script>

    <!-- Naver SDK -->
    <script src="https://static.nid.naver.com/js/naveridlogin_js_sdk_2.0.2.js"></script>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDHLjmS_uPeuD5FFSCnmH2UwqVmWgCyZgY",
            authDomain: "buttertteokmaps.firebaseapp.com",
            projectId: "buttertteokmaps",
            storageBucket: "buttertteokmaps.firebasestorage.app",
            messagingSenderId: "865189221098",
            appId: "1:865189221098:web:20f0621f7208a5c2513d93",
            measurementId: "G-W23877W9WX"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // Kakao Configuration
        const KAKAO_KEY = 'c8bac9e41374ae0bfbffbef06cd2407b';
        const KAKAO_REDIRECT_URI = 'https://trendesert-web.github.io/buttertteokmaps/owner.html';

        // Initialize Kakao
        if (Kakao && !Kakao.isInitialized()) {
            Kakao.init(KAKAO_KEY);
        }

        // Naver Configuration
        const NAVER_CLIENT_ID = 'yEh4vAG8Y13DQHujjJCa';
        const NAVER_CALLBACK_URL = 'https://trendesert-web.github.io/buttertteokmaps/owner.html';

        // Check authentication state on page load
        window.addEventListener('DOMContentLoaded', function() {
            // Check for stored user info from any provider
            const storedUser = localStorage.getItem('authUser');
            if (storedUser) {
                try {
                    const user = JSON.parse(storedUser);
                    displayLoggedInState(user);
                } catch (e) {
                    displayLoggedOutState();
                }
            } else {
                // Check Firebase auth state
                auth.onAuthStateChanged(function(user) {
                    if (user) {
                        const userData = {
                            uid: user.uid,
                            email: user.email,
                            displayName: user.displayName,
                            photoURL: user.photoURL,
                            provider: 'google'
                        };
                        displayLoggedInState(userData);
                    } else {
                        displayLoggedOutState();
                    }
                });
            }

            // Check for Kakao callback code
            checkKakaoCallback();

            // Check for Naver callback token
            checkNaverCallback();
        });

        // Check for Kakao callback
        function checkKakaoCallback() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');

            if (code) {
                // Kakao auth code received, get access token
                getKakaoAccessToken(code);
            }
        }

        // Check for Naver callback
        function checkNaverCallback() {
            const hash = window.location.hash;
            if (hash.includes('access_token')) {
                // Parse the hash for access token
                const match = hash.match(/access_token=([^&]*)/);
                if (match && match[1]) {
                    getNaverUserInfo(match[1]);
                }
            }
        }

        // Display logged in state
        function displayLoggedInState(user) {
            const loginContainer = document.querySelector('.login-container');
            const logoutBtn = document.getElementById('logoutBtn');

            // Hide login form with fade out
            loginContainer.style.animation = 'slideInFromRight 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) reverse';

            setTimeout(() => {
                loginContainer.style.display = 'none';
                logoutBtn.style.display = 'block';

                const greeting = user.displayName || user.email || '사용자';
                showAlert(`환영합니다, ${greeting}!`, 'success');

                setTimeout(() => {
                    redirectToDashboard(user);
                }, 1500);
            }, 600);
        }

        // Display logged out state
        function displayLoggedOutState() {
            const loginContainer = document.querySelector('.login-container');
            const logoutBtn = document.getElementById('logoutBtn');

            loginContainer.style.display = 'block';
            logoutBtn.style.display = 'none';
        }

        // Handle Google Login
        function handleGoogleLogin() {
            const googleBtn = document.getElementById('googleBtn');
            googleBtn.disabled = true;
            googleBtn.innerHTML = '<div class="loading-spinner"></div><span>로그인 중...</span>';

            const provider = new firebase.auth.GoogleAuthProvider();

            auth.signInWithPopup(provider)
                .then(function(result) {
                    const user = result.user;
                    const userData = {
                        uid: user.uid,
                        email: user.email,
                        displayName: user.displayName,
                        photoURL: user.photoURL,
                        provider: 'google'
                    };
                    storeUserInfo(userData);
                    displayLoggedInState(userData);
                })
                .catch(function(error) {
                    googleBtn.disabled = false;
                    googleBtn.innerHTML = '<div class="button-icon"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg></div><span>Google로 시작하기</span>';

                    let errorMessage = '로그인 실패: ';
                    if (error.code === 'auth/popup-closed-by-user') {
                        errorMessage += '팝업이 닫혔습니다.';
                    } else if (error.code === 'auth/cancelled-popup-request') {
                        errorMessage += '로그인이 취소되었습니다.';
                    } else {
                        errorMessage += error.message;
                    }
                    showAlert(errorMessage, 'error');
                });
        }

        // Handle Kakao Login
        function handleKakaoLogin() {
            const kakaoBtn = document.getElementById('kakaoBtn');
            kakaoBtn.disabled = true;
            kakaoBtn.innerHTML = '<div class="loading-spinner"></div><span>로그인 중...</span>';

            Kakao.Auth.login({
                success: function(response) {
                    // Get user info after successful login
                    Kakao.API.request({
                        url: '/v2/user/me',
                        success: function(response) {
                            const kakaoUser = {
                                uid: 'kakao_' + response.id,
                                email: response.kakao_account?.email || '',
                                displayName: response.kakao_account?.profile?.nickname || 'Kakao User',
                                photoURL: response.kakao_account?.profile?.profile_image_url || '',
                                provider: 'kakao'
                            };
                            storeUserInfo(kakaoUser);
                            displayLoggedInState(kakaoUser);
                        },
                        fail: function(error) {
                            kakaoBtn.disabled = false;
                            kakaoBtn.innerHTML = '<div class="button-icon"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path fill="currentColor" d="M12 2C6.48 2 2 5.58 2 10c0 2.85 1.51 5.35 3.85 6.85-.15 1.17-.84 3.6-.98 4.21-.2.88.44 1.42 1.27.87 1.26-.84 3.37-2.25 4.59-3.1 1.04.08 2.12.12 3.27.12 5.52 0 10-3.58 10-8s-4.48-8-10-8z"/></svg></div><span>카카오로 시작하기</span>';
                            showAlert('사용자 정보 조회 실패: ' + error, 'error');
                        }
                    });
                },
                fail: function(error) {
                    kakaoBtn.disabled = false;
                    kakaoBtn.innerHTML = '<div class="button-icon"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path fill="currentColor" d="M12 2C6.48 2 2 5.58 2 10c0 2.85 1.51 5.35 3.85 6.85-.15 1.17-.84 3.6-.98 4.21-.2.88.44 1.42 1.27.87 1.26-.84 3.37-2.25 4.59-3.1 1.04.08 2.12.12 3.27.12 5.52 0 10-3.58 10-8s-4.48-8-10-8z"/></svg></div><span>카카오로 시작하기</span>';
                    let errorMessage = '카카오 로그인 실패: ';
                    if (error && error.message) {
                        errorMessage += error.message;
                    } else {
                        errorMessage += '다시 시도해주세요.';
                    }
                    showAlert(errorMessage, 'error');
                }
            });
        }

        // Get Kakao access token
        function getKakaoAccessToken(code) {
            const kakaoBtn = document.getElementById('kakaoBtn');
            kakaoBtn.disabled = true;
            kakaoBtn.innerHTML = '<div class="loading-spinner"></div><span>로그인 중...</span>';

            // The SDK handles this, just proceed with getting user info
            Kakao.API.request({
                url: '/v2/user/me',
                success: function(response) {
                    const kakaoUser = {
                        uid: 'kakao_' + response.id,
                        email: response.kakao_account?.email || '',
                        displayName: response.kakao_account?.profile?.nickname || 'Kakao User',
                        photoURL: response.kakao_account?.profile?.profile_image_url || '',
                        provider: 'kakao'
                    };
                    storeUserInfo(kakaoUser);
                    displayLoggedInState(kakaoUser);
                },
                fail: function(error) {
                    kakaoBtn.disabled = false;
                    kakaoBtn.innerHTML = '<div class="button-icon"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path fill="currentColor" d="M12 2C6.48 2 2 5.58 2 10c0 2.85 1.51 5.35 3.85 6.85-.15 1.17-.84 3.6-.98 4.21-.2.88.44 1.42 1.27.87 1.26-.84 3.37-2.25 4.59-3.1 1.04.08 2.12.12 3.27.12 5.52 0 10-3.58 10-8s-4.48-8-10-8z"/></svg></div><span>카카오로 시작하기</span>';
                    showAlert('사용자 정보 조회 실패', 'error');
                }
            });
        }

        // Handle Naver Login
        function handleNaverLogin() {
            const naverBtn = document.getElementById('naverBtn');
            naverBtn.disabled = true;
            naverBtn.innerHTML = '<div class="loading-spinner"></div><span>로그인 중...</span>';

            // Use implicit grant flow
            const state = 'naver_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('naver_state', state);

            const naverAuthURL = `https://nid.naver.com/oauth2.0/authorize?client_id=${NAVER_CLIENT_ID}&response_type=token&redirect_uri=${encodeURIComponent(NAVER_CALLBACK_URL)}&state=${state}`;
            window.location.href = naverAuthURL;
        }

        // Get Naver user info
        function getNaverUserInfo(accessToken) {
            const naverBtn = document.getElementById('naverBtn');
            naverBtn.disabled = true;
            naverBtn.innerHTML = '<div class="loading-spinner"></div><span>로그인 중...</span>';

            fetch('https://openapi.naver.com/v1/nid/me', {
                headers: {
                    'Authorization': 'Bearer ' + accessToken
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.resultcode === '00' && data.response) {
                    const naverUser = {
                        uid: 'naver_' + data.response.id,
                        email: data.response.email || '',
                        displayName: data.response.name || data.response.nickname || 'Naver User',
                        photoURL: data.response.profile_image || '',
                        provider: 'naver'
                    };
                    storeUserInfo(naverUser);
                    displayLoggedInState(naverUser);
                } else {
                    naverBtn.disabled = false;
                    naverBtn.innerHTML = '<div class="button-icon"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><rect width="24" height="24" fill="none"/><text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle" font-weight="bold" font-size="16" fill="white">N</text></svg></div><span>네이버로 시작하기</span>';
                    showAlert('사용자 정보 조회 실패', 'error');
                }
            })
            .catch(error => {
                naverBtn.disabled = false;
                naverBtn.innerHTML = '<div class="button-icon"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><rect width="24" height="24" fill="none"/><text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle" font-weight="bold" font-size="16" fill="white">N</text></svg></div><span>네이버로 시작하기</span>';
                showAlert('네이버 로그인 실패: ' + error.message, 'error');
            });
        }

        // Handle Guest Login
        function handleGuestLogin() {
            localStorage.setItem('guestMode', 'true');
            window.location.href = 'dashboard.html?guest=true';
        }

        // Handle Logout
        function handleLogout() {
            if (confirm('정말로 로그아웃하시겠습니까?')) {
                // Get current user provider
                const storedUser = localStorage.getItem('authUser');
                let provider = 'google';
                if (storedUser) {
                    try {
                        const user = JSON.parse(storedUser);
                        provider = user.provider || 'google';
                    } catch (e) {
                        // Use default
                    }
                }

                // Handle logout based on provider
                if (provider === 'google') {
                    auth.signOut()
                        .then(function() {
                            clearAuthData();
                        })
                        .catch(function(error) {
                            showAlert('로그아웃 실패: ' + error.message, 'error');
                        });
                } else if (provider === 'kakao') {
                    if (Kakao && Kakao.Auth) {
                        Kakao.Auth.logout(function() {
                            clearAuthData();
                        });
                    } else {
                        clearAuthData();
                    }
                } else if (provider === 'naver') {
                    // Naver logout
                    clearAuthData();
                } else {
                    clearAuthData();
                }
            }
        }

        // Clear authentication data
        function clearAuthData() {
            localStorage.removeItem('authUser');
            localStorage.removeItem('firebaseUser');
            localStorage.removeItem('guestMode');
            displayLoggedOutState();
            showAlert('로그아웃되었습니다.', 'success');
        }

        // Store user information in localStorage
        function storeUserInfo(user) {
            localStorage.setItem('authUser', JSON.stringify(user));
            // Also keep for backward compatibility
            if (user.provider === 'google') {
                localStorage.setItem('firebaseUser', JSON.stringify({
                    uid: user.uid,
                    email: user.email,
                    displayName: user.displayName,
                    photoURL: user.photoURL
                }));
            }
        }

        // Redirect to dashboard
        function redirectToDashboard(user) {
            if (user) {
                window.location.href = 'dashboard.html';
            }
        }

        // Show alert message
        function showAlert(message, type) {
            const alertContainer = document.getElementById('alertContainer');
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert-message alert-${type}`;
            alertDiv.textContent = message;
            alertContainer.appendChild(alertDiv);

            setTimeout(() => {
                alertDiv.remove();
            }, 4000);
        }

        // Toggle settings dropdown
        function toggleSettingsDropdown() {
            const dropdown = document.getElementById('settingsDropdown');
            dropdown.classList.toggle('active');

            document.addEventListener('click', function closeDropdown(event) {
                if (!event.target.closest('.settings-icon')) {
                    dropdown.classList.remove('active');
                    document.removeEventListener('click', closeDropdown);
                }
            });
        }

        // Open Kakao Talk
        function openKakaoTalk() {
            alert('카카오톡 1:1 문의: trendesert@gmail.com\n\n직접 연락 주시거나 위 이메일로 문의해주세요.');
        }

        // Keyboard shortcut for settings
        document.addEventListener('keydown', function(event) {
            if (event.key === 's' && event.ctrlKey) {
                event.preventDefault();
                document.querySelector('.settings-icon').click();
            }
        });
    </script>
